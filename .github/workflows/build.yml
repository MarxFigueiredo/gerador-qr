name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            ninja-build
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd\nd975f751698a77b662f1254ddbeed3901e976f5a" \
            > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo -e "\n601085b94cd77f0b54ff86406957099ebe79c4d6" \
            > $HOME/.buildozer/android/platform/android-sdk/licenses/android-googletv-license

      - name: Build APK
        run: |
          buildozer init

          # Requisitos
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec

          # API e NDK — usando linhas com ou sem # (cobre ambos os casos)
          sed -i 's/^#\?android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/^#\?android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^#\?android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^#\?android.arch = .*/android.arch = arm64-v8a/' buildoze
